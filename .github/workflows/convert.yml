name: Convert hagezi to mrs

on:
  push:
    # only run when domain-list sources might change
    paths:
      - 'wildcard/*.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2                        # need at least two commits for diff :contentReference[oaicite:4]{index=4}

      - name: Determine changed txt files
        id: filter
        run: |
          set -eux -o pipefail
          # get list of wildcard/*.txt changed in this push
          files=$(git diff --name-only HEAD^ HEAD | grep '^wildcard/.*\.txt$' || true)
          # emit JSON array for matrix
          json=$(printf '%s\n' $files | jq -R -s -c 'split("\n")[:-1]')
          echo "::set-output name=changed::$json"
        shell: bash

  convert:
    needs: discover
    runs-on: ubuntu-latest
    if: ${{ needs.discover.outputs.matrix != '[]' }}  # skip if nothing changed :contentReference[oaicite:5]{index=5}
    strategy:
      matrix:
        ruleset: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('wildcard/*.txt') }}

      - name: Install system deps
        run: |
          set -eux -o pipefail
          sudo apt-get update
          sudo apt-get install -y curl wget git jq

      - name: Download latest Mihomo .deb
        uses: softprops/action-gh-release@v1
        with:
          repository: MetaCubeX/mihomo
          pattern: "mihomo-linux-amd64-alpha.*\\.deb"

      - name: Install Mihomo
        run: sudo apt install --fix-missing ${{ steps.get_deb.outputs.asset_path }}

      - name: Convert changed list → .mrs
        env:
          NO_SKIP: true
        run: |
          mkdir -p hagezi
          src=${{ matrix.ruleset }}
          base=$(basename "$src" .txt)
          mihomo convert-ruleset domain text "$src" hagezi/"$base".mrs

      - name: Commit & push only updated .mrs
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Update .mrs for changed lists ${{ github.run_started_at }}'
          push: true
          default_author: github_actions
          pathspec: hagezi/${{ matrix.ruleset basename('.txt') }}.mrs

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: hagezi-mrs
          path: hagezi/*.mrs
