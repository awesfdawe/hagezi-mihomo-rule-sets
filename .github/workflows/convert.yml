name: Convert hagezi to mrs

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt update && sudo apt install -y curl jq

      - name: Cache Mihomo binary
        id: cache-mihomo
        uses: actions/cache@v4
        with:
          path: ./mihomo
          key: mihomo-binary-${{ runner.os }}-v1

      - name: Download Mihomo binary (if not cached)
        if: steps.cache-mihomo.outputs.cache-hit != 'true'
        run: |
          curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
          | jq -r '.assets[] | select(.name | contains("linux-amd64") and endswith("gz")) | .browser_download_url' \
          | head -n 1 \
          | xargs wget -qO - | tar -xz -C . && chmod +x mihomo

      - name: Prepare hagezi directory
        run: mkdir -p hagezi txt_cache

      - name: Download updated Hagezi blocklists
        run: |
          for list in \
            light-onlydomains \
            multi-onlydomains \
            pro-onlydomains \
            pro.mini-onlydomains \
            pro.plus-onlydomains \
            pro.plus.mini-onlydomains \
            ultimate-onlydomains \
            ultimate.mini-onlydomains \
            tif-onlydomains \
            tif.medium-onlydomains \
            tif.mini-onlydomains; do
              echo "Checking ${list}.txt ..."
              URL="https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/${list}.txt"
              # Download only if newer (-z means compare with existing file timestamp)
              curl -z "txt_cache/${list}.txt" -o "txt_cache/${list}.txt" -L --silent "$URL"
          done

      - name: Convert changed blocklists to .mrs
        run: |
          declare -A names=(
            ["light-onlydomains"]="light"
            ["multi-onlydomains"]="normal"
            ["pro-onlydomains"]="pro"
            ["pro.mini-onlydomains"]="pro.mini"
            ["pro.plus-onlydomains"]="pro.plus"
            ["pro.plus.mini-onlydomains"]="pro.plus.mini"
            ["ultimate-onlydomains"]="ultimate"
            ["ultimate.mini-onlydomains"]="ultimate.mini"
            ["tif-onlydomains"]="tif"
            ["tif.medium-onlydomains"]="tif.medium"
            ["tif.mini-onlydomains"]="tif.mini"
          )

          for src in "${!names[@]}"; do
            txt_file="txt_cache/${src}.txt"
            mrs_file="hagezi/${names[$src]}.mrs"
            if [[ ! -f "$mrs_file" ]] || [[ "$txt_file" -nt "$mrs_file" ]]; then
              echo "Converting ${src}.txt to ${mrs_file} ..."
              ./mihomo convert-ruleset domain text "$txt_file" "${names[$src]}.mrs"
              mv "${names[$src]}.mrs" hagezi/
            else
              echo "No changes in ${src}.txt, skipping conversion."
            fi
          done

      - name: Set current date
        id: date
        run: echo "DATE=$(TZ=Europe/Moscow date +'%Y-%m-%dT%H:%M:%S')" >> $GITHUB_ENV

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Generating .mrs rule-sets ${{ env.DATE }}'
          push: true
          default_author: github_actions
