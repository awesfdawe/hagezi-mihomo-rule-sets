name: Convert hagezi to mrs

on:
  push:
    paths:
      - 'wildcard/*.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout code (depth=2)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed txt files
        id: filter
        shell: bash
        run: |
          set -eux -o pipefail
          # list wildcard/*.txt changed in this push
          files=$(git diff --name-only HEAD^ HEAD | grep '^wildcard/.*\.txt$' || true)
          # turn into JSON array
          json=$(printf '%s\n' $files | jq -R -s -c 'split("\n")[:-1]')
          # export via GITHUB_OUTPUT (new syntax) 
          echo "changed=$json" >> $GITHUB_OUTPUT

  convert:
    needs: discover
    runs-on: ubuntu-latest
    # skip entire job if no changed files
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    strategy:
      matrix:
        ruleset: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout code (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache APT packages
        uses: actions/cache@v3
        with:
          path: /var/cache/apt
          key: ${{ runner.os }}-apt-${{ hashFiles('wildcard/*.txt') }}

      - name: Install deps
        shell: bash
        run: |
          set -eux -o pipefail
          sudo apt-get update
          sudo apt-get install -y curl wget git jq

      - name: Download latest Mihomo .deb
        uses: softprops/action-gh-release@v1
        with:
          repository: MetaCubeX/mihomo
          pattern: "mihomo-linux-amd64-alpha.*\\.deb"

      - name: Install Mihomo
        run: sudo apt install --fix-missing ${{ steps.get_deb.outputs.asset_path }}

      - name: Convert one changed list → .mrs
        shell: bash
        env:
          NO_SKIP: true
        run: |
          src=${{ matrix.ruleset }}
          base=$(basename "$src" .txt)
          mkdir -p hagezi
          mihomo convert-ruleset domain text "$src" hagezi/"$base".mrs

      - name: Commit & push only that .mrs
        shell: bash
        run: |
          set -eux -o pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add hagezi/"$base".mrs
          git diff --staged --quiet || git commit -m "Update .mrs for $base at ${{ github.run_started_at }}"
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: hagezi-mrs
          path: hagezi/*.mrs
